<html class="dark" dir="ltr" lang="en">
<head>

    <title>Image Converter</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com" rel="preconnect">
    <link crossorigin href="https://fonts.gstatic.com" rel="preconnect">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect x='0' y='0' width='100' height='100' rx='20' fill='%230F1B2D'/><rect x='20' y='25' width='60' height='50' rx='8' fill='none' stroke='%232196f3' stroke-width='3'/><circle cx='50' cy='50' r='15' fill='none' stroke='%232196f3' stroke-width='2.5'/><circle cx='70' cy='32' r='4' fill='%232196f3'/></svg>" type="image/svg+xml">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: '#2196f3',
                        'surface': '#0F1B2D',
                        'surface-dim': '#0F1B2D',
                        'surface-bright': '#1a2b44',
                        'surface-container-lowest': '#0F1B2D',
                        'surface-container-low': '#16253b',
                        'on-surface-variant': '#cbd5e0',
                        'outline-variant': '#2d3748',
                        'danger': '#ef4444'
                    },
                    fontFamily: {
                        sans: ['Plus Jakarta Sans', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        body {
            min-height: 100vh;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }
        .custom-shadow {
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.5), 0 8px 10px -6px rgba(0, 0, 0, 0.5);
        }
        .dashed-border {
            background-image: url("data:image/svg+xml,%3csvg width='100%25' height='100%25' xmlns='http://www.w3.org/2000/svg'%3e%3crect width='100%25' height='100%25' fill='none' rx='8' ry='8' stroke='%232196F3' stroke-width='2' stroke-dasharray='8%2c 8' stroke-dashoffset='0' stroke-linecap='square'/%3e%3c/svg%3e");
            border-radius: 8px;
        }
    </style>
</head>
<body class="flex flex-col bg-slate-50 dark:bg-surface text-slate-900 dark:text-white transition-colors duration-300">
    <div class="fixed top-6 left-6 z-50">
        <button id="themeToggle" class="p-3 rounded-full bg-white dark:bg-surface-bright border border-slate-200 dark:border-outline-variant shadow-lg hover:scale-110 transition-all text-primary">
            <span class="material-symbols-outlined block dark:hidden">dark_mode</span>
            <span class="material-symbols-outlined hidden dark:block">light_mode</span>
        </button>
    </div>

    <!-- Main Content -->
    <main class="flex-grow flex items-center justify-center p-4 md:p-8 min-h-screen">
        <div class="bg-white dark:bg-surface-container-low rounded-lg custom-shadow max-w-2xl w-full p-8 md:p-12 border border-slate-200 dark:border-outline-variant">
            
            <!-- Header -->
            <div class="mb-8 text-center">
                <h1 class="text-3xl font-bold text-slate-900 dark:text-white mb-2"><span style="color: #2196f3; font-size: 2.5rem;"></span> Image Converter</h1>
                <p class="text-slate-500 dark:text-on-surface-variant text-sm">Convert your images to different formats</p>
            </div>

            <!-- Status Messages -->
            <div id="statusMessage" class="mb-6 p-4 rounded-lg hidden"></div>

            <!-- Drag & Drop Area -->
            <div id="dropZone" class="dashed-border py-16 px-6 mb-8 cursor-pointer hover:bg-slate-50 dark:hover:bg-surface-bright transition-colors group">
                <div class="flex flex-col items-center">
                    <div class="mb-4 text-primary">
                        <svg class="w-16 h-16" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"></path>
                            <path d="M15 13a3 3 0 11-6 0 3 3 0 016 0z" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"></path>
                        </svg>
                    </div>
                    <p class="text-primary font-semibold text-lg mb-1">Drag images here or click to select</p>
                    <p class="text-slate-500 dark:text-on-surface-variant text-sm">PNG, JPEG, WebP, BMP, GIF supported</p>
                    <input type="file" id="fileInput" multiple accept="image/*" class="hidden">
                </div>
            </div>

            <!-- Format Selection -->
            <div class="mb-8">
                <p class="text-slate-900 dark:text-white font-medium mb-4">Select conversion format:</p>
                <div id="formatGrid" class="grid grid-cols-2 md:grid-cols-5 gap-3">
                    <button class="format-btn py-2 border border-slate-200 dark:border-outline-variant rounded text-slate-600 dark:text-on-surface-variant font-medium hover:border-primary hover:text-primary transition-all" data-format="png">PNG</button>
                    <button class="format-btn py-2 border border-slate-200 dark:border-outline-variant rounded text-slate-600 dark:text-on-surface-variant font-medium hover:border-primary hover:text-primary transition-all" data-format="jpeg">JPEG</button>
                    <button class="format-btn py-2 border border-slate-200 dark:border-outline-variant rounded text-slate-600 dark:text-on-surface-variant font-medium hover:border-primary hover:text-primary transition-all" data-format="webp">WebP</button>
                    <button class="format-btn py-2 border border-slate-200 dark:border-outline-variant rounded text-slate-600 dark:text-on-surface-variant font-medium hover:border-primary hover:text-primary transition-all" data-format="bmp">BMP</button>
                    <button class="format-btn py-2 border border-slate-200 dark:border-outline-variant rounded text-slate-600 dark:text-on-surface-variant font-medium hover:border-primary hover:text-primary transition-all" data-format="gif">GIF</button>
                </div>
            </div>

            <!-- Status Text -->
            <div class="mb-10 text-slate-500 dark:text-on-surface-variant text-sm text-center">
                <span id="statusText">No images selected yet</span>
            </div>

            <!-- Image List -->
            <div id="imageList" class="mb-8 max-h-64 overflow-y-auto"></div>

            <!-- Progress Bar -->
            <div id="progressContainer" class="mb-8 hidden">
                <div class="w-full bg-slate-200 dark:bg-outline-variant rounded-full h-2 mb-2 overflow-hidden">
                    <div id="progressBar" class="bg-primary h-full transition-all duration-300" style="width: 0%"></div>
                </div>
                <p class="text-slate-500 dark:text-on-surface-variant text-sm text-center"><span id="progressText">0</span>%</p>
            </div>

            <!-- Action Buttons -->
            <div class="flex flex-col gap-4">
                <button id="convertBtn" disabled class="w-full py-4 bg-primary/40 text-slate-400 dark:text-white/50 font-bold rounded-lg shadow-sm cursor-not-allowed transition-all">
                    Convert & Download ZIP
                </button>
                <button id="clearBtn" class="w-full py-3 bg-danger text-white font-bold rounded-lg hover:bg-red-600 transition-all active:scale-95 shadow-md">
                    Clear All
                </button>
            </div>
        </div>
    </main>

    <script>
        const themeToggle = document.getElementById('themeToggle');
        const html = document.documentElement;

        themeToggle.addEventListener('click', () => {
            html.classList.toggle('dark');
        });

        let selectedFiles = [];
        let selectedFormat = 'png';
        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');
        const statusText = document.getElementById('statusText');
        const imageList = document.getElementById('imageList');
        const convertBtn = document.getElementById('convertBtn');
        const clearBtn = document.getElementById('clearBtn');
        const formatGrid = document.getElementById('formatGrid');
        const progressContainer = document.getElementById('progressContainer');
        const progressBar = document.getElementById('progressBar');
        const progressText = document.getElementById('progressText');
        const statusMessage = document.getElementById('statusMessage');

        dropZone.addEventListener('click', () => fileInput.click());
        dropZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropZone.classList.add('bg-slate-50', 'dark:bg-surface-bright');
        });
        dropZone.addEventListener('dragleave', () => {
            dropZone.classList.remove('bg-slate-50', 'dark:bg-surface-bright');
        });
        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.classList.remove('bg-slate-50', 'dark:bg-surface-bright');
            handleFiles(e.dataTransfer.files);
            if (e.dataTransfer.files.length > 0) {
                showStatus(`✓ Successfully upload ${e.dataTransfer.files.length} image${e.dataTransfer.files.length > 1 ? 's' : ''}!`, 'success');
            }
        });

        fileInput.addEventListener('change', (e) => {
            handleFiles(e.target.files);
            if (e.target.files.length > 0) {
                showStatus(`✓ Successfully upload ${e.target.files.length} image${e.target.files.length > 1 ? 's' : ''}!`, 'success');
            }
        });

        function handleFiles(files) {
            selectedFiles = Array.from(files).filter(f => f.type.startsWith('image/'));
            updateUI();
        }

        function updateUI() {
            if (selectedFiles.length === 0) {
                statusText.textContent = 'No images selected yet';
                imageList.innerHTML = '';
                convertBtn.disabled = true;
                convertBtn.classList.remove('bg-primary', 'text-white', 'hover:bg-blue-600', 'active:scale-95');
                convertBtn.classList.add('bg-primary/40', 'text-slate-400', 'dark:text-white/50', 'cursor-not-allowed');
            } else {
                statusText.textContent = `Selected ${selectedFiles.length} image${selectedFiles.length > 1 ? 's' : ''}`;
                imageList.innerHTML = selectedFiles.map((file, index) => `
                    <div class="flex items-center justify-between p-3 bg-slate-100 dark:bg-surface-bright rounded mb-2">
                        <span class="text-sm text-slate-700 dark:text-on-surface-variant truncate">${file.name}</span>
                        <button onclick="removeFile(${index})" class="ml-2 text-danger hover:text-red-700 text-sm font-medium">Remove</button>
                    </div>
                `).join('');
                
                if (convertBtn.disabled) {
                    convertBtn.disabled = false;
                    convertBtn.classList.add('bg-primary', 'text-white', 'hover:bg-blue-600', 'active:scale-95');
                    convertBtn.classList.remove('bg-primary/40', 'text-slate-400', 'dark:text-white/50', 'cursor-not-allowed');
                }
            }
        }

        function removeFile(index) {
            selectedFiles.splice(index, 1);
            updateUI();
        }

        formatGrid.addEventListener('click', (e) => {
            if (e.target.classList.contains('format-btn')) {
                document.querySelectorAll('.format-btn').forEach(btn => {
                    btn.classList.remove('bg-primary', 'text-white');
                    btn.classList.add('border', 'border-slate-200', 'dark:border-outline-variant', 'text-slate-600', 'dark:text-on-surface-variant');
                });
                e.target.classList.remove('border', 'border-slate-200', 'dark:border-outline-variant', 'text-slate-600', 'dark:text-on-surface-variant');
                e.target.classList.add('bg-primary', 'text-white');
                selectedFormat = e.target.dataset.format;
            }
        });

        document.querySelector('[data-format="png"]').classList.add('bg-primary', 'text-white');
        document.querySelector('[data-format="png"]').classList.remove('border', 'border-slate-200', 'dark:border-outline-variant', 'text-slate-600', 'dark:text-on-surface-variant');

        clearBtn.addEventListener('click', () => {
            selectedFiles = [];
            fileInput.value = '';
            updateUI();
            showStatus('All images cleared', 'success');
        });

        convertBtn.addEventListener('click', async () => {
            if (selectedFiles.length === 0) return;

            convertBtn.disabled = true;
            progressContainer.classList.remove('hidden');
            statusMessage.classList.add('hidden');

            const zip = new JSZip();
            const folder = zip.folder('converted-images');
            let processed = 0;

            try {
                for (const file of selectedFiles) {
                    const canvas = await fileToCanvas(file);
                    const blob = await canvasToBlob(canvas, selectedFormat);
                    const newName = file.name.split('.')[0] + '.' + selectedFormat;
                    folder.file(newName, blob);
                    
                    processed++;
                    updateProgress(processed, selectedFiles.length);
                }

                const zipBlob = await zip.generateAsync({ type: 'blob' });
                downloadZip(zipBlob);
                showStatus(`✓ Successfully converted ${selectedFiles.length} image${selectedFiles.length > 1 ? 's' : ''}!`, 'success');
            } catch (error) {
                showStatus('✗ Error: ' + error.message, 'error');
            } finally {
                convertBtn.disabled = false;
                setTimeout(() => {
                    progressContainer.classList.add('hidden');
                }, 1000);
            }
        });

        function fileToCanvas(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const img = new Image();
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        canvas.width = img.width;
                        canvas.height = img.height;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0);
                        resolve(canvas);
                    };
                    img.onerror = () => reject(new Error('Failed to load image'));
                    img.src = e.target.result;
                };
                reader.onerror = () => reject(new Error('Failed to read file'));
                reader.readAsDataURL(file);
            });
        }

        function canvasToBlob(canvas, format) {
            return new Promise((resolve) => {
                const mimeType = {
                    'png': 'image/png',
                    'jpeg': 'image/jpeg',
                    'webp': 'image/webp',
                    'bmp': 'image/bmp',
                    'gif': 'image/gif'
                }[format] || 'image/png';

                canvas.toBlob(resolve, mimeType, 0.95);
            });
        }

        function updateProgress(current, total) {
            const percent = Math.round((current / total) * 100);
            progressBar.style.width = percent + '%';
            progressText.textContent = percent;
        }

        function downloadZip(blob) {
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `converted-images-${new Date().getTime()}.zip`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }

        function showStatus(message, type) {
            statusMessage.textContent = message;
            statusMessage.classList.remove('hidden');
            if (type === 'success') {
                statusMessage.classList.add('bg-green-100', 'dark:bg-green-900', 'text-green-800', 'dark:text-green-200');
                statusMessage.classList.remove('bg-red-100', 'dark:bg-red-900', 'text-red-800', 'dark:text-red-200');
            } else {
                statusMessage.classList.add('bg-red-100', 'dark:bg-red-900', 'text-red-800', 'dark:text-red-200');
                statusMessage.classList.remove('bg-green-100', 'dark:bg-green-900', 'text-green-800', 'dark:text-green-200');
            }
            
            setTimeout(() => {
                statusMessage.classList.add('hidden');
            }, 4000);
        }
    </script>
</body>
</html>
